name: pip build linux

on: [push, pull_request]

jobs:
  build:
    name: build pip wheel
    runs-on: ubuntu-latest
    # cf. https://github.com/GUDHI/gudhi-deploy/blob/main/Dockerfile_for_pip
    container: ghcr.io/gudhi/gudhi-deploy/pip_for_gudhi:2026.03.01
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Build wheel for Python 3.10
        env:
          SKBUILD_CMAKE_DEFINE: "Python_EXECUTABLE=$PYTHON310/bin/python"
        run: |
          $PYTHON310/bin/python -m pip wheel -ve .
          auditwheel repair *.whl
        # manylinux_2_17_x86_64 (aliased by manylinux2014_x86_64)
      - name: Upload linux python wheel
        uses: actions/upload-artifact@v6
        with:
          name: linux python wheel
          path: wheelhouse/*.whl
      # NumPy 2.X is installed and guarantees ABI compatibility, test it with the minimal numpy version
      # Minimal test setup that requires optional pytest scipy matplotlib scikit-learn POT
      # but without tests that requires torch, tensorflow, eagerpy, pykeops, hnswlib
      # TODO: test_human_off fails because the file is not copied at the right place
      - name: Install and test wheel for Python 3.10
        run: |
          $PYTHON310/bin/python -m pip install numpy~=1.21.6
          $PYTHON310/bin/python -m pip install --user pytest scipy matplotlib scikit-learn POT wheelhouse/*.whl
          $PYTHON310/bin/python -c "import gudhi; print(gudhi.__version__)"
          cp data/points/human.off .
          $PYTHON310/bin/python -m pytest src/python/test/test_alpha_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_betti_curve_representations.py
          $PYTHON310/bin/python -m pytest src/python/test/test_bottleneck_distance.py
          $PYTHON310/bin/python -m pytest src/python/test/test_collapse_edges.py
          $PYTHON310/bin/python -m pytest src/python/test/test_cover_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_cubical_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_cubical_persistence_low_dim.py
          $PYTHON310/bin/python -m pytest src/python/test/test_datasets_generators.py
          $PYTHON310/bin/python -m pytest src/python/test/test_delaunay_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_dtm_rips_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_euclidean_witness_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_off.py
          $PYTHON310/bin/python -m pytest src/python/test/test_persistence_graphical_tools.py
          $PYTHON310/bin/python -m pytest src/python/test/test_reader_utils.py
          $PYTHON310/bin/python -m pytest src/python/test/test_remote_datasets.py
          $PYTHON310/bin/python -m pytest src/python/test/test_representations_interface.py
          $PYTHON310/bin/python -m pytest src/python/test/test_representations_preprocessing.py
          $PYTHON310/bin/python -m pytest src/python/test/test_representations.py
          $PYTHON310/bin/python -m pytest src/python/test/test_rips_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_simplex_generators.py
          $PYTHON310/bin/python -m pytest src/python/test/test_simplex_tree.py
          $PYTHON310/bin/python -m pytest src/python/test/test_simplex_tree_serialization.py
          $PYTHON310/bin/python -m pytest src/python/test/test_sklearn_cubical_persistence.py
          $PYTHON310/bin/python -m pytest src/python/test/test_sklearn_rips_persistence.py
          $PYTHON310/bin/python -m pytest src/python/test/test_subsampling.py
          $PYTHON310/bin/python -m pytest src/python/test/test_tangential_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_time_delay.py
          $PYTHON310/bin/python -m pytest src/python/test/test_tomato.py
          $PYTHON310/bin/python -m pytest src/python/test/test_wasserstein_barycenter.py
          $PYTHON310/bin/python -m pytest src/python/test/test_weighted_rips_complex.py
          $PYTHON310/bin/python -m pytest src/python/test/test_witness_complex.py
